# DonorsChoose (KDD Cup 2014) — Early-Warning System tutorial database.
# Mirrors dirtyduck/docker-compose.yml. Ships a synthetic sample by default; mount the real
# Kaggle CSVs to use full-scale data (see the commented volume + README).

services:
  donors_db:
    build:
      context: ./donors_db
    image: donorschoose/db
    environment:
      POSTGRES_USER: donors_user
      POSTGRES_PASSWORD: some_password
      POSTGRES_DB: donors
    volumes:
      - db-data:/var/lib/postgresql/data
      # To load the REAL KDD Cup 2014 data instead of the baked-in synthetic sample, drop
      # projects.csv / donations.csv / resources.csv / essays.csv into ./donors_db/real and
      # uncomment (the loader COPYs from /data either way). Then `docker compose build` is NOT
      # needed — just remove the db-data volume so init re-runs:
      # - ./donors_db/real:/data:ro
    ports:
      # host port overridable to avoid collisions (DirtyDuck uses 5434/5435).
      - "${DONORS_PG_PORT:-5436}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donors_user -d donors"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
