# Publishes the two self-contained HTML artifacts + screenshots to GitHub Pages:
# https://ccd-ia.github.io/triage-pg/ (onboarding.html serves as index.html).
# Pages enabled 2026-07-11 (Source: GitHub Actions) — the push trigger is live again
# (it was manual-only while Pages was off, when any triggered run failed red).

name: docs-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/*.html"
      - "docs/images/**"

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the static bundle
        run: |
          mkdir -p _site/images
          cp docs/onboarding.html _site/index.html
          cp docs/triage-pg-vs-dssg-triage.html _site/
          cp docs/images/*.png _site/images/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
