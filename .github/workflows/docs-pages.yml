# OPTIONAL, GATED (v1-release plan P10): publishes the two self-contained HTML artifacts
# + screenshots to GitHub Pages so the onboarding one-pager gets a shareable URL.
# MANUAL-ONLY until the maintainer enables Pages (Settings → Pages → Source: GitHub
# Actions) — with Pages off, any triggered run fails and reddens the checks (seen
# 2026-07-06 and 2026-07-11). Once Pages is enabled, restore the push trigger:
#   push: { branches: [main], paths: ["docs/*.html", "docs/images/**"] }

name: docs-pages

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the static bundle
        run: |
          mkdir -p _site/images
          cp docs/onboarding.html _site/index.html
          cp docs/triage-pg-vs-dssg-triage.html _site/
          cp docs/images/*.png _site/images/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
