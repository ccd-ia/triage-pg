# Publishes the docs site (Astro Starlight, docs-site/) to GitHub Pages:
# https://ccd-ia.github.io/triage-pg/ — the Starlight index is the site root
# (IA decision 2026-07-12, specs/dssg-style-tutorials-github-pages.html);
# onboarding.html + the DSSG comparison keep their URLs via public/ passthrough
# (docs-site/scripts/prebuild.mjs). The build fails on broken internal links
# (starlight-links-validator), so a red run here means a real docs defect.
# Pages enabled 2026-07-11 (Source: GitHub Actions).

name: docs-pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - "docs/*.html"
      - "docs/images/**"

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - run: npm ci
        working-directory: docs-site
      - run: npm run build
        working-directory: docs-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist
      - id: deployment
        uses: actions/deploy-pages@v4
