# RETIRED (v1-release plan P10, 2026-07-06) — do not resurrect without a maintainer call.
#
# The previous version of this workflow triggered on EVERY tag push and attempted a PyPI
# publish; triage-pg is not on PyPI (install is `uv sync` from a checkout), so tagging
# v1.0.0-rc1 would have fired a doomed release. PyPI publishing is a post-v1.0.0 decision.
#
# The file is kept as a neutralized stub because repo tooling protects .github/ from
# deletion; `git rm` it at review. workflow_dispatch-only = it can never fire on its own.
name: retired — publish to PyPI (disabled)

on:
  workflow_dispatch:

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "This workflow is retired (v1-release plan P10). PyPI publishing is a"
          echo "post-v1.0.0 decision; releases are handled by release.yml (GHCR + GitHub Release)."
          exit 1
