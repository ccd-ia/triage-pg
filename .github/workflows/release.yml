# CD on tag (v1-release plan P10): every v* tag reproducibly yields the runnable
# container on GHCR and a GitHub Release carrying the onboarding + comparison artifacts.
# No PyPI (deliberately retired), no environment deploys (the cloud gate, ADR-0004/0005,
# stays closed — a future deploy.yml can hang off this same trigger once it opens).

name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: SSH for the featurizer pin
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.FEATURIZER_DEPLOY_KEY }}
      - run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
      - name: Build + push
        run: |
          mapfile -t tags <<< "${{ steps.meta.outputs.tags }}"
          args=()
          for t in "${tags[@]}"; do args+=(-t "$t"); done
          docker build --ssh default "${args[@]}" .
          docker push --all-tags ghcr.io/${{ github.repository }}
      - name: GitHub Release (prerelease for -rc tags)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          files: |
            docs/onboarding.html
            docs/triage-pg-vs-dssg-triage.html
