# CI — tests / lint / frontend / terraform / docker (v1-release plan P10).
#
# Prereq secret (maintainer, once): FEATURIZER_DEPLOY_KEY — a READ-ONLY deploy key on
# nanounanue/featurizer. The featurizer pin is git+ssh (ADR-0016); the key keeps the pin
# byte-identical in pyproject/uv.lock. The docker job runs on push-to-main only, so the
# key is never exposed to fork PRs.
#
# pytest-postgresql spawns its own throwaway PostgreSQL from system binaries — no service
# container; the runner's postgres bin dir just needs to be on PATH.

name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: SSH for the featurizer pin
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.FEATURIZER_DEPLOY_KEY }}
      - run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.12
      - name: PostgreSQL binaries for pytest-postgresql
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          find /usr/lib/postgresql -maxdepth 2 -type d -name bin | sort -V | tail -1 >> "$GITHUB_PATH"
      - name: Sync (all extras — the suite imports sksurv/fastapi/authlib)
        run: uv sync --extra dev --extra dashboard --extra survival --extra oidc
      # --timeout guards the historical multiprocessing-hang failure mode (2026-01 CI).
      - run: uv run pytest src/tests/ --timeout=300

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check src/

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check
      # offline — `terraform apply` and the live Batch E2E stay gated (ADR-0004/0005)
      - run: terraform init -backend=false
      - run: terraform validate

  docker:
    # main only: proves the image builds without exposing the deploy key to fork PRs.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: SSH for the featurizer pin
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.FEATURIZER_DEPLOY_KEY }}
      - run: ssh-keyscan github.com >> ~/.ssh/known_hosts
      - uses: docker/setup-buildx-action@v3
      - name: Build (no push)
        run: docker build --ssh default -t triage-pg:ci .
