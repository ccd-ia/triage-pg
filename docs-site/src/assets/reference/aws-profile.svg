<svg viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Inter,sans-serif" role="img" aria-label="The cloud profile: EventBridge or an operator submits one AWS Batch job per experiment; the container authenticates to RDS with IAM tokens and stores matrices and models on S3; the dashboard reads the project databases.">
  <defs><marker id="aw" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>
  <g font-size="12" font-weight="600" text-anchor="middle">
    <rect x="20" y="40" width="170" height="52" rx="9" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
    <text x="105" y="62" fill="#334155">operator / EventBridge</text>
    <text x="105" y="80" font-size="10" font-weight="400" fill="#64748b">triage run · scheduled score</text>

    <rect x="270" y="30" width="200" height="72" rx="9" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
    <text x="370" y="54" fill="#b45309">AWS Batch</text>
    <text x="370" y="72" font-size="10" font-weight="400" fill="#64748b">one job = one experiment</text>
    <text x="370" y="88" font-size="10" font-weight="400" fill="#64748b">ghcr.io/ccd-ia/triage-pg image</text>

    <rect x="560" y="20" width="280" height="64" rx="9" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
    <text x="700" y="44" fill="#0f766e">Amazon RDS (PostgreSQL)</text>
    <text x="700" y="62" font-size="10" font-weight="400" fill="#64748b">registry + one database per project</text>
    <text x="700" y="76" font-size="10" font-weight="400" fill="#64748b">IAM auth — short-lived tokens, no stored passwords</text>

    <rect x="560" y="120" width="280" height="56" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="700" y="142" fill="#4f46e5">Amazon S3</text>
    <text x="700" y="160" font-size="10" font-weight="400" fill="#64748b">matrices (Parquet) + model binaries</text>

    <rect x="270" y="200" width="200" height="64" rx="9" fill="#f0fdf4" stroke="#15803d" stroke-width="1.5"/>
    <text x="370" y="224" fill="#15803d">dashboard / CLI</text>
    <text x="370" y="242" font-size="10" font-weight="400" fill="#64748b">reads predictions + evaluations</text>
    <text x="370" y="256" font-size="10" font-weight="400" fill="#64748b">from the project databases</text>
  </g>
  <g stroke="#64748b" stroke-width="1.4" fill="none">
    <line x1="190" y1="66" x2="270" y2="66" marker-end="url(#aw)"/>
    <line x1="470" y1="52" x2="560" y2="46" marker-end="url(#aw)"/>
    <line x1="470" y1="84" x2="560" y2="140" marker-end="url(#aw)"/>
    <path d="M560 60 C 500 60 420 140 400 200" marker-end="url(#aw)" stroke-dasharray="4 3"/>
  </g>
  <text x="430" y="290" text-anchor="middle" font-size="10.5" fill="#64748b">authored + offline-validated (terraform validate); the live Batch E2E is the open gate between v1.0.0-rc and v1.0.0</text>
</svg>
