<svg viewBox="0 0 760 90" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'Segoe UI',Inter,sans-serif" role="img" aria-label="The triage-pg pipeline: cohort and labels, features, matrices, train and predict, in-database evaluation">
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#64748b"/></marker></defs>
  <g font-size="12" font-weight="600" text-anchor="middle">
    <rect x="8"   y="22" width="128" height="46" rx="9" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
    <text x="72"  y="42" fill="#0f766e">cohort + labels</text><text x="72" y="58" font-size="10" font-weight="400" fill="#475569">templated SQL</text>
    <rect x="164" y="22" width="128" height="46" rx="9" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
    <text x="228" y="42" fill="#0f766e">features</text><text x="228" y="58" font-size="10" font-weight="400" fill="#475569">DFS, as-of joins</text>
    <rect x="320" y="22" width="128" height="46" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="384" y="42" fill="#4f46e5">matrices</text><text x="384" y="58" font-size="10" font-weight="400" fill="#475569">Parquet, per split</text>
    <rect x="476" y="22" width="128" height="46" rx="9" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="540" y="42" fill="#4f46e5">train + predict</text><text x="540" y="58" font-size="10" font-weight="400" fill="#475569">append-only</text>
    <rect x="632" y="22" width="120" height="46" rx="9" fill="#fffbeb" stroke="#b45309" stroke-width="1.5"/>
    <text x="692" y="42" fill="#b45309">evaluate</text><text x="692" y="58" font-size="10" font-weight="400" fill="#475569">in PostgreSQL</text>
  </g>
  <g stroke="#64748b" stroke-width="1.4">
    <line x1="136" y1="45" x2="164" y2="45" marker-end="url(#a)"/>
    <line x1="292" y1="45" x2="320" y2="45" marker-end="url(#a)"/>
    <line x1="448" y1="45" x2="476" y2="45" marker-end="url(#a)"/>
    <line x1="604" y1="45" x2="632" y2="45" marker-end="url(#a)"/>
  </g>
</svg>
