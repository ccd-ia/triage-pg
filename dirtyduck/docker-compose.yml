# DirtyDuck Tutorial - Docker Compose Configuration

services:
  food_db:
    build:
      context: ./food_db
    image: dirtyduck/db
    environment:
      # Standard PostgreSQL environment variables
      POSTGRES_USER: food_user
      POSTGRES_PASSWORD: some_password
      POSTGRES_DB: food
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      # host port is overridable via DIRTYDUCK_PG_PORT. Default 5440 is chosen to be
      # collision-free: 5434 clashes with meio-sim, 5435 (old quickstart value) with fosas.
      - "${DIRTYDUCK_PG_PORT:-5440}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food_user -d food"]
      interval: 5s
      timeout: 3s
      retries: 5

  bastion:
    build:
      context: ..
      dockerfile: Dockerfile
      target: base
      # featurizer is a public git+https pin on ccd-ia/featurizer (ADR-0008/0016);
      # the image's `uv sync` clones it anonymously — no ssh forwarding needed.
    image: dsapp/triage:dev
    # bind-mounts host paths (../example/dirtyduck, ../dirtyduck-output) — run as the
    # host user so files written inside (run outputs) aren't root-owned (Docker hard rule).
    # export UID/GID in your env / .envrc before `docker compose up`.
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      food_db:
        condition: service_healthy
    tty: true
    stdin_open: true
    environment:
      # Use standard PostgreSQL environment variables
      PGHOST: food_db
      PGPORT: 5432
      PGUSER: food_user
      PGPASSWORD: some_password
      PGDATABASE: food
      # For compatibility with old scripts
      DATABASE_URL: postgresql://food_user:some_password@food_db/food
      TRIAGE_OUTPUT: /triage-output
    volumes:
      - ../example/dirtyduck:/dirtyduck
      - ../dirtyduck-output:/triage-output
    working_dir: /dirtyduck

volumes:
  db-data:
